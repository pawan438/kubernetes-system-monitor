prometheus:
  prometheusSpec:
    retention: 10d              # How long metrics are kept before being discarded
    resources:                    # Prevents Prometheus from consuming unbounded resources
      requests:
        cpu: 200m
        memory: 400Mi
      limits:
        cpu: 500m
        memory: 800Mi

grafana:
  defaultDashboardsEnabled: true   # Ships with built-in Kubernetes dashboards
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # Admin password is auto-generated by the chart and stored in a Secret —
  # retrieve it with:
  #   kubectl get secret -n monitoring kube-prometheus-stack-grafana \
  #     -o jsonpath="{.data.admin-password}" | base64 -d

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
